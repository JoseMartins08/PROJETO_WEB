<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jotech</title>
        <link rel="stylesheet" href="CSS/index-style.css">
    </head>
    <body>
        <header>
            <h1>Jotech</h1>
            <p>💻 Hardware de PC</p>
        </header>

        <div id="conteudo">

            <!-- Área dos produtos disponíveis -->
            <div id="area-produtos">
                <h2>🛍️ Produtos</h2>

                <div id="filtro-preco">
                    <label>Filtrar por preço:</label>
                    
                    <select id="select-preco">
                        <option value="todos">Todos</option>
                        <option value="500">Até R$500</option>
                        <option value="1000">Até R$1000</option>
                        <option value="2000">Até R$2000</option>
                        <option value="5000">Até R$5000</option>
                    </select>
                </div>

                <div id="lista-produtos">

                </div>
            </div>

            <!-- Carrinho de compras funcional -->
            <div id="area-carrinho">

                <h2>🛒 Carrinho</h2>
                <div id="lista-carrinho">
                    <p id="msg-vazio">Carrinho vazio.</p>
                </div>
                <hr>
                <p id="total-compra"><strong>Total: R$ 0,00</strong></p>
                <button id="btn-limpar">🧹 Limpar Carrinho</button>

            </div>

        </div>

        <script src="https://unpkg.com/@studio-freight/lenis"></script>
        <script src="JAVASCRIPT/index-script.js"></script>
    </body>
</html>
